{{- $Destination := .Destination -}}
{{- $Text := .Text -}}
{{- $Title := .Title -}}

{{- $img := resources.Get $Destination -}}

{{- if $img -}}
  <img src="{{ $img.RelPermalink }}" alt="{{ $Text }}" {{ with $Title }}title="{{ . }}"{{ end }} />
{{- else -}}
  <img src="{{ $Destination | safeURL }}" alt="{{ $Text }}" {{ with $Title }}title="{{ . }}"{{ end }} />
{{- end -}}
