<!DOCTYPE html>
<html>
<head>
{{ partial "head.html" . }}
</head>
<body>
  <header>
  {{ partial "nav.html" . }}
  {{ if .Params.math }}{{ partial "katex.html" . }}{{ end }}
  </header>

  <main>
    <h1>{{ .Title }}</h1>
    {{ if .Date }}<p style="color:#888;font-size:0.9rem;margin:-0.5em 0 1.5em;">{{ .Date.Format "2006-01-02" }}</p>{{ end }}
    <div>{{ .Content }}</div>
  </main>
</body>
{{ partial "footer.html" . }}
</html>
